version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "08:00"
    open-pull-requests-limit: 10
    reviewers:
    - caiocampos
    assignees:
    - caiocampos

  - package-ecosystem: npm
    directory: "/back"
    schedule:
      interval: daily
      time: "08:00"
    open-pull-requests-limit: 10
    reviewers:
    - caiocampos
    assignees:
    - caiocampos

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
    - caiocampos
    assignees:
    - caiocampos
